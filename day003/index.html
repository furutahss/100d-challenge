<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="大きいほうをタップして遊ぶ、子ども向けの知育ゲームです。" />
    <meta name="theme-color" content="#fff8e9" />
    <title>どっちが大きい？ | 直感タップ</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="header">
        <a class="home-link" href="./" aria-label="ゲームのはじめに戻る">どっちが大きい？</a>
        <div class="score-pill" aria-label="せいかい数"><span aria-hidden="true">⭐</span> <strong id="score">0</strong></div>
      </header>

      <section id="start-screen" class="screen start-screen">
        <div class="hero-illustration" aria-hidden="true"><span class="sun">☀️</span><span class="cloud cloud-one">☁️</span><span class="cloud cloud-two">☁️</span><span class="bear">🐻</span></div>
        <p class="eyebrow">あたまの たいそう</p>
        <h1>どっちが<br /><em>おおきい？</em></h1>
        <p class="start-copy">おおきい ほうを<br />ぽん！と おしてね</p>
        <button id="start-button" class="main-button" type="button">あそぶ！ <span aria-hidden="true">▶</span></button>
        <p class="round-note">ぜんぶで 10もん</p>
      </section>

      <section id="game-screen" class="screen game-screen" hidden>
        <div class="progress-row" aria-label="問題の進み具合"><span id="question-count">1 / 10</span><div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div></div>
        <h1 class="question-title">おおきい ほうを<br /><em>おしてね！</em></h1>
        <div id="choices" class="choices" aria-label="答えを選ぶ"></div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>

      <section id="result-screen" class="screen result-screen" hidden>
        <div id="result-face" class="result-face" aria-hidden="true">🎉</div>
        <p class="eyebrow">けっか はっぴょう！</p>
        <h1 id="result-title">すごい！</h1>
        <p class="result-score"><strong id="final-score">0</strong><span> / 10 もん せいかい</span></p>
        <p id="result-message" class="result-message"></p>
        <button id="retry-button" class="main-button" type="button">もういっかい！ <span aria-hidden="true">↻</span></button>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
